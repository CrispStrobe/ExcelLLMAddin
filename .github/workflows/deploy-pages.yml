name: Deploy add-in to GitHub Pages

# Builds officejs/ and publishes dist/ (taskpane, functions, functions.json,
# manifest.xml, icons) to GitHub Pages at https://crispstrobe.github.io/ExcelLLMAddin/.
# One-time setup: repo Settings -> Pages -> Source: "GitHub Actions".

on:
  push:
    branches: [ main ]
    paths: [ "officejs/**", ".github/workflows/deploy-pages.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        working-directory: officejs
        run: npm install --no-audit --no-fund
      - name: Production build
        working-directory: officejs
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: officejs/dist
      - id: deployment
        uses: actions/deploy-pages@v4
