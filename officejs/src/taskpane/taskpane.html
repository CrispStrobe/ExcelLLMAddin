<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Settings</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  </head>
  <body>
    <main class="pane">
      <h1>LLM Add-in</h1>
      <p class="hint">Configure a provider, then use <code>=LLM.PROMPT("…")</code> in any cell.</p>

      <label for="provider">Provider</label>
      <select id="provider"></select>

      <label for="model">Model
        <button id="refreshModels" type="button" class="link">load list</button>
      </label>
      <input id="model" placeholder="e.g. openai/gpt-4o-mini" autocomplete="off" />
      <input id="modelFilter" class="hidden" placeholder="filter models…" autocomplete="off" />
      <select id="modelSelect" class="hidden" size="6"></select>

      <label for="apiKey">API key <span class="muted">(not needed for Ollama or when using a proxy)</span></label>
      <input id="apiKey" type="password" placeholder="sk-…" autocomplete="off" />

      <details>
        <summary>Advanced</summary>
        <label for="baseUrl">Base URL override</label>
        <input id="baseUrl" placeholder="(provider default)" />

        <label for="proxyUrl">Proxy URL <span class="muted">(recommended for cloud providers — keeps keys server-side)</span></label>
        <input id="proxyUrl" placeholder="https://your-proxy.example/api" />

        <label for="embedModel">Embedding model <span class="muted">(for =LLM.SIMILARITY)</span></label>
        <input id="embedModel" placeholder="e.g. Qwen/Qwen3-Embedding-8B" autocomplete="off" />

        <label for="mcpUrl">MCP server URL <span class="muted">(adds remote tools to the agent)</span></label>
        <input id="mcpUrl" placeholder="https://your-mcp-server/rpc" autocomplete="off" />

        <label for="imageApiKey">Image (BFL) API key <span class="muted">(for =LLM.IMAGE)</span></label>
        <input id="imageApiKey" type="password" placeholder="Black Forest Labs key" autocomplete="off" />

        <label for="systemPrompt">System prompt override</label>
        <textarea id="systemPrompt" rows="2" placeholder="(default)"></textarea>
      </details>

      <div class="row">
        <button id="save" type="button" class="primary">Save</button>
        <button id="test" type="button">Test</button>
        <button id="reload" type="button" title="Reload the add-in to pick up updates">Reload</button>
      </div>

      <p id="status" class="status" role="status"></p>
      <p id="usage" class="usage muted">No usage yet. <a id="usageReset" href="#" class="link">reset</a></p>

      <hr class="sep" />
      <h2 class="agent-h">Agent <span class="muted">— lets the model edit your sheet</span></h2>
      <div id="agentPresets" class="chips"></div>
      <textarea id="agentInput" rows="2" placeholder="e.g. In D1 put the sum of B2:B10, then bold any cell over 100"></textarea>
      <button id="agentRun" type="button" class="primary">Run agent</button>
      <label class="agentopt"><input type="checkbox" id="agentAuto" /> apply changes without asking</label>
      <div id="agentLog" class="agentlog" role="status"></div>
      <button id="agentApply" type="button" class="primary agent-apply" style="display:none">Apply changes</button>
    </main>
  </body>
</html>
